<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- #happy# - Big sunny smiley -->
  <circle cx="60" cy="60" r="50" fill="#FFD93D" stroke="#F9A825" stroke-width="3"/>

  <!-- Rosy cheeks -->
  <circle cx="30" cy="68" r="10" fill="#FF9A9E" opacity="0.5"/>
  <circle cx="90" cy="68" r="10" fill="#FF9A9E" opacity="0.5"/>

  <!-- Eyes - happy closed arcs -->
  <path d="M 35 50 Q 42 40 50 50" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 70 50 Q 78 40 86 50" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Big smile -->
  <path d="M 35 68 Q 60 95 85 68" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sparkles -->
  <circle cx="18" cy="20" r="3" fill="#FFD700"/>
  <circle cx="102" cy="18" r="2.5" fill="#FFD700"/>
  <circle cx="8" cy="45" r="2" fill="#FFD700"/>
</svg>
