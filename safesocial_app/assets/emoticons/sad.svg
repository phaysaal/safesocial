<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- #sad# - Cute sad face with tear -->
  <circle cx="60" cy="60" r="50" fill="#90CAF9" stroke="#42A5F5" stroke-width="3"/>

  <!-- Eyes - big sad puppy eyes -->
  <ellipse cx="40" cy="50" rx="10" ry="12" fill="white"/>
  <ellipse cx="80" cy="50" rx="10" ry="12" fill="white"/>
  <ellipse cx="42" cy="52" rx="6" ry="7" fill="#1A237E"/>
  <ellipse cx="82" cy="52" rx="6" ry="7" fill="#1A237E"/>
  <circle cx="44" cy="49" r="2.5" fill="white"/>
  <circle cx="84" cy="49" r="2.5" fill="white"/>

  <!-- Sad eyebrows -->
  <path d="M 28 38 Q 38 32 52 38" fill="none" stroke="#1A237E" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 68 38 Q 82 32 92 38" fill="none" stroke="#1A237E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Sad mouth -->
  <path d="M 40 78 Q 60 68 80 78" fill="none" stroke="#1A237E" stroke-width="3" stroke-linecap="round"/>

  <!-- Tear drop -->
  <path d="M 85 60 Q 92 72 85 80 Q 78 72 85 60" fill="#29B6F6"/>
</svg>
