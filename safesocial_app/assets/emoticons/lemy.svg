<svg viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
  <!-- #premacy# - Cute Mazda Premacy front view with smiley face -->

  <!-- Body / hood -->
  <path d="M 15 55 Q 15 30 35 22 L 50 18 Q 70 12 90 18 L 105 22 Q 125 30 125 55 L 125 75 Q 125 82 118 82 L 22 82 Q 15 82 15 75 Z"
    fill="#4FC3F7" stroke="#0288D1" stroke-width="2"/>

  <!-- Windshield -->
  <path d="M 30 35 Q 70 20 110 35 L 105 48 Q 70 42 35 48 Z"
    fill="#B3E5FC" stroke="#0288D1" stroke-width="1.5" opacity="0.8"/>

  <!-- Windshield shine -->
  <path d="M 45 32 Q 60 26 75 30" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Headlights (eyes!) - big and cute -->
  <path d="M 18 50 Q 18 42 30 42 L 42 42 Q 48 42 48 50 Q 48 58 42 58 L 30 58 Q 18 58 18 50 Z"
    fill="white" stroke="#0288D1" stroke-width="1.5"/>
  <path d="M 92 50 Q 92 42 98 42 L 110 42 Q 122 42 122 50 Q 122 58 110 58 L 98 58 Q 92 58 92 50 Z"
    fill="white" stroke="#0288D1" stroke-width="1.5"/>

  <!-- Pupils -->
  <ellipse cx="36" cy="50" rx="6" ry="7" fill="#1A237E"/>
  <ellipse cx="104" cy="50" rx="6" ry="7" fill="#1A237E"/>
  <circle cx="38" cy="47" r="2.5" fill="white"/>
  <circle cx="106" cy="47" r="2.5" fill="white"/>
  <circle cx="34" cy="52" r="1.2" fill="white"/>
  <circle cx="102" cy="52" r="1.2" fill="white"/>

  <!-- Grille (smile!) -->
  <path d="M 35 62 Q 40 60 50 62 Q 70 72 90 62 Q 100 60 105 62"
    fill="none" stroke="#0288D1" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Lower grille - big grin -->
  <path d="M 38 66 Q 70 80 102 66" fill="#0277BD" stroke="#01579B" stroke-width="1.5" rx="5"/>
  <path d="M 42 66 Q 70 77 98 66" fill="#263238"/>

  <!-- Teeth in grin -->
  <line x1="55" y1="66" x2="55" y2="73" stroke="#546E7A" stroke-width="1"/>
  <line x1="70" y1="66" x2="70" y2="75" stroke="#546E7A" stroke-width="1"/>
  <line x1="85" y1="66" x2="85" y2="73" stroke="#546E7A" stroke-width="1"/>

  <!-- Fog lights (rosy cheeks) -->
  <ellipse cx="25" cy="70" rx="6" ry="4" fill="#FF9A9E" opacity="0.5"/>
  <ellipse cx="115" cy="70" rx="6" ry="4" fill="#FF9A9E" opacity="0.5"/>

  <!-- Hood emblem (nose) -->
  <circle cx="70" cy="55" r="4" fill="#0288D1" stroke="#01579B" stroke-width="1"/>
  <text x="67" y="58" font-size="5" fill="white" font-weight="bold">M</text>

  <!-- Eyebrows (hood lines) -->
  <path d="M 20 40 Q 33 36 48 40" fill="none" stroke="#0277BD" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 92 40 Q 107 36 120 40" fill="none" stroke="#0277BD" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wheels peeking at bottom -->
  <ellipse cx="30" cy="85" rx="12" ry="6" fill="#37474F"/>
  <ellipse cx="30" cy="85" rx="5" ry="3" fill="#78909C"/>
  <ellipse cx="110" cy="85" rx="12" ry="6" fill="#37474F"/>
  <ellipse cx="110" cy="85" rx="5" ry="3" fill="#78909C"/>

  <!-- Sparkle -->
  <polygon points="130,20 131.5,24 136,24 132.5,27 134,31 130,28 126,31 127.5,27 124,24 128.5,24" fill="#FFD700"/>
</svg>
