<svg viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
  <!-- #lami# - Sporty white car with dark glass and smiley front -->

  <!-- Body / hood - white with sporty lines -->
  <path d="M 15 55 Q 15 28 40 20 L 55 16 Q 70 10 85 16 L 100 20 Q 125 28 125 55 L 125 72 Q 125 80 118 80 L 22 80 Q 15 80 15 72 Z"
    fill="#F5F5F5" stroke="#BDBDBD" stroke-width="2"/>

  <!-- Dark tinted windshield - sporty -->
  <path d="M 30 33 Q 70 16 110 33 L 106 48 Q 70 40 34 48 Z"
    fill="#212121" stroke="#424242" stroke-width="1.5"/>

  <!-- Windshield reflection -->
  <path d="M 42 28 Q 60 22 78 26" fill="none" stroke="#616161" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Sport hood scoop -->
  <path d="M 52 50 L 52 46 Q 70 42 88 46 L 88 50" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="1"/>

  <!-- Sporty headlights (aggressive eyes) -->
  <path d="M 16 48 L 28 44 L 48 44 Q 50 44 50 48 Q 50 56 44 56 L 28 56 Q 16 56 16 48 Z"
    fill="white" stroke="#9E9E9E" stroke-width="1.5"/>
  <path d="M 124 48 L 112 44 L 92 44 Q 90 44 90 48 Q 90 56 96 56 L 112 56 Q 124 56 124 48 Z"
    fill="white" stroke="#9E9E9E" stroke-width="1.5"/>

  <!-- LED DRL strips inside headlights -->
  <line x1="20" y1="48" x2="46" y2="48" stroke="#FFD600" stroke-width="2" stroke-linecap="round"/>
  <line x1="94" y1="48" x2="120" y2="48" stroke="#FFD600" stroke-width="2" stroke-linecap="round"/>

  <!-- Pupils - determined sporty look -->
  <ellipse cx="36" cy="50" rx="6" ry="5" fill="#1A237E"/>
  <ellipse cx="104" cy="50" rx="6" ry="5" fill="#1A237E"/>
  <circle cx="38" cy="48" r="2" fill="white"/>
  <circle cx="106" cy="48" r="2" fill="white"/>

  <!-- Sporty grille - wide grin -->
  <path d="M 32 60 Q 70 58 108 60" fill="none" stroke="#424242" stroke-width="2" stroke-linecap="round"/>

  <!-- Lower grille - big sporty smile -->
  <path d="M 35 63 Q 70 78 105 63" fill="#333" stroke="#212121" stroke-width="1.5"/>
  <path d="M 38 63 Q 70 75 102 63" fill="#1A1A1A"/>

  <!-- Mesh pattern in grille -->
  <line x1="50" y1="63" x2="50" y2="71" stroke="#555" stroke-width="0.8"/>
  <line x1="60" y1="63" x2="60" y2="73" stroke="#555" stroke-width="0.8"/>
  <line x1="70" y1="63" x2="70" y2="74" stroke="#555" stroke-width="0.8"/>
  <line x1="80" y1="63" x2="80" y2="73" stroke="#555" stroke-width="0.8"/>
  <line x1="90" y1="63" x2="90" y2="71" stroke="#555" stroke-width="0.8"/>

  <!-- Fog lights -->
  <rect x="20" y="62" width="10" height="5" rx="2" fill="#FFD600" opacity="0.6"/>
  <rect x="110" y="62" width="10" height="5" rx="2" fill="#FFD600" opacity="0.6"/>

  <!-- Sport stripe accents -->
  <line x1="55" y1="20" x2="55" y2="55" stroke="#E53935" stroke-width="1.5" opacity="0.4"/>
  <line x1="85" y1="20" x2="85" y2="55" stroke="#E53935" stroke-width="1.5" opacity="0.4"/>

  <!-- Hood emblem -->
  <circle cx="70" cy="54" r="4" fill="#424242" stroke="#212121" stroke-width="1"/>
  <text x="67" y="57" font-size="5" fill="white" font-weight="bold">L</text>

  <!-- Sporty wheels -->
  <ellipse cx="28" cy="84" rx="13" ry="6" fill="#212121"/>
  <ellipse cx="28" cy="84" rx="6" ry="3" fill="#616161"/>
  <ellipse cx="112" cy="84" rx="13" ry="6" fill="#212121"/>
  <ellipse cx="112" cy="84" rx="6" ry="3" fill="#616161"/>

  <!-- Speed sparkle -->
  <polygon points="132,15 133.5,20 138,20 134.5,23 136,28 132,25 128,28 129.5,23 126,20 130.5,20" fill="#FFD600"/>
</svg>
