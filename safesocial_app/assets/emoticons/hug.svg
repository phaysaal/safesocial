<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- #hug# - Warm hugging face -->
  <circle cx="60" cy="55" r="45" fill="#FFD93D" stroke="#F9A825" stroke-width="3"/>

  <!-- Blushing cheeks -->
  <circle cx="30" cy="62" r="10" fill="#FF9A9E" opacity="0.5"/>
  <circle cx="90" cy="62" r="10" fill="#FF9A9E" opacity="0.5"/>

  <!-- Closed happy eyes -->
  <path d="M 38 50 Q 45 42 52 50" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <path d="M 68 50 Q 75 42 82 50" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>

  <!-- Warm smile -->
  <path d="M 42 68 Q 60 82 78 68" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>

  <!-- Hugging hands -->
  <path d="M 15 60 Q 5 75 15 90 Q 20 95 30 90 L 30 75" fill="#FFD93D" stroke="#F9A825" stroke-width="3" stroke-linecap="round"/>
  <path d="M 105 60 Q 115 75 105 90 Q 100 95 90 90 L 90 75" fill="#FFD93D" stroke="#F9A825" stroke-width="3" stroke-linecap="round"/>

  <!-- Hearts floating -->
  <path d="M 55 18 C 53 14 48 14 48 18 C 48 22 55 26 55 26 C 55 26 62 22 62 18 C 62 14 57 14 55 18" fill="#FF5252" transform="scale(0.6) translate(10,5)"/>
  <path d="M 55 18 C 53 14 48 14 48 18 C 48 22 55 26 55 26 C 55 26 62 22 62 18 C 62 14 57 14 55 18" fill="#FF80AB" transform="scale(0.4) translate(220,15)"/>
</svg>
