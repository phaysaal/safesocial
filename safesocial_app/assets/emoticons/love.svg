  <!-- Sparkles around -->
  <circle cx="20" cy="15" r="2" fill="#FFD700"/>
  <circle cx="100" cy="12" r="2.5" fill="#FFD700"/>
  <circle cx="15" cy="70" r="1.5" fill="#FF69B4"/>
  <circle cx="105" cy="65" r="2" fill="#FF69B4"/>

  <!-- Star sparkles -->
  <polygon points="25,8 26.5,13 31,13 27.5,16 29,21 25,18 21,21 22.5,16 19,13 23.5,13" fill="#FFD700"/>
  <polygon points="98,5 99,8.5 103,8.5 100,11 101,14.5 98,12 95,14.5 96,11 93,8.5 97,8.5" fill="#FFD700"/>
</svg>
