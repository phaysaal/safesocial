<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- #laugh# - Laughing so hard face -->
  <circle cx="60" cy="60" r="50" fill="#FFD93D" stroke="#F9A825" stroke-width="3"/>

  <!-- Tears of joy -->
  <path d="M 28 55 Q 22 65 28 72 Q 34 65 28 55" fill="#29B6F6"/>
  <path d="M 92 55 Q 86 65 92 72 Q 98 65 92 55" fill="#29B6F6"/>

  <!-- Eyes - squeezed shut from laughing -->
  <path d="M 30 50 Q 40 42 50 50" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 70 50 Q 80 42 90 50" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 30 50 Q 40 58 50 50" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 70 50 Q 80 58 90 50" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Wide open laughing mouth -->
  <path d="M 35 68 Q 60 100 85 68 Z" fill="#5D4037"/>
  <path d="M 40 68 Q 60 60 80 68" fill="#FF8A80"/>
  <path d="M 45 85 Q 60 92 75 85" fill="#FF5252"/>

  <!-- Rosy cheeks -->
  <circle cx="25" cy="65" r="8" fill="#FF9A9E" opacity="0.4"/>
  <circle cx="95" cy="65" r="8" fill="#FF9A9E" opacity="0.4"/>
</svg>
