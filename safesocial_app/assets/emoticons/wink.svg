<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- #wink# - Cute winking face -->
  <circle cx="60" cy="60" r="50" fill="#FFD93D" stroke="#F9A825" stroke-width="3"/>

  <!-- Left eye - open -->
  <ellipse cx="40" cy="52" rx="8" ry="10" fill="white"/>
  <ellipse cx="42" cy="53" rx="5" ry="6" fill="#5D4037"/>
  <circle cx="44" cy="50" r="2" fill="white"/>

  <!-- Right eye - winking -->
  <path d="M 70 52 Q 80 45 90 52" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Tongue out smile -->
  <path d="M 38 70 Q 60 85 82 70" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="60" cy="80" rx="8" ry="5" fill="#FF5252"/>

  <!-- Blush -->
  <circle cx="28" cy="65" r="8" fill="#FF9A9E" opacity="0.5"/>
  <circle cx="92" cy="65" r="8" fill="#FF9A9E" opacity="0.5"/>

  <!-- Sparkle -->
  <circle cx="100" cy="22" r="3" fill="#FFD700"/>
  <circle cx="95" cy="30" r="1.5" fill="#FFD700"/>
</svg>
