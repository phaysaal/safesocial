name: spheres_app
description: Spheres — Decentralized P2P Social Network
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  veilid:
    git:
      url: https://gitlab.com/veilid/veilid.git
      path: veilid-flutter
  provider: ^6.1.1
  go_router: ^14.0.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  intl: ^0.19.0
  uuid: ^4.3.3
  equatable: ^2.0.5
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  flutter_svg: ^2.0.10
  web_socket_channel: ^3.0.1
  flutter_webrtc: ^0.12.4
  permission_handler: ^11.3.1
  crypto: ^3.0.3
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon_1024.png
    - assets/images/logo.png
    - assets/emoticons/
